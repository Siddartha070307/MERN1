<!DOCTYPE html>
<html lang="en">
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="dummy.css">
</head>
<body>

    <h1 style="color: antiquewhite;">Products</h1>
    <input type="text" id="search" class="input" placeholder="Search products..." >
    <button onclick="search()" type="button" class="btn btn-primary">Search</button>
    <div id="container"></div>
    <template id="productTemplate">
        <div class="card">
            <h3 class="title"></h3>
            <p class="description"></p>
            <img class="image" src="" alt="Product Image">
            <h4 class="price" style="font-size:20px; color:beige;"></h4>
        </div>
    </template>

    <script src="dummy.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
